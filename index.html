<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenProse SaaS - 流程自动化平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .features {
            text-align: left;
            margin: 30px 0;
        }
        
        .feature {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .feature strong {
            color: #667eea;
        }
        
        .cta {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s;
        }
        
        .cta:hover {
            transform: translateY(-3px);
        }
        
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 OpenProse SaaS</h1>
        <p>流程自动化平台 - 让 AI 代理执行复杂工作流</p>
        
        <div class="features">
            <div class="feature">
                <strong>📝 流程定义</strong><br>
                使用 .prose 文件定义工作流程
            </div>
            <div class="feature">
                <strong>🤖 AI 代理</strong><br>
                通过 OpenClaw 连接本地 AI 代理
            </div>
            <div class="feature">
                <strong>☁️ 云端管理</strong><br>
                在云端管理和监控工作流
            </div>
            <div class="feature">
                <strong>🔒 安全可靠</strong><br>
                本地执行，云端编排
            </div>
        </div>
        
        <a href="/login" class="cta">立即开始</a>
        
        <div class="footer">
            © 2026 OpenProse SaaS | proseup.cn
        </div>
    </div>
</body>
</html>
